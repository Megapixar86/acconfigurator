<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
	<script src = "script.js"></script>
</head>
<body>
    <div class="container">
        <h1>Конфигуратор аксессуаров</h1>
        
        <div class="configurator">
            <div class="form-group">
                <label for="series">Серия:</label>
                <select id="series">
                    <option value="">Выберите серию</option>
                    <option value="1">1 серия</option>
                </select>
            </div>

            <div class="form-group">
                <label for="caseType">Тип корпуса:</label>
                <select id="caseType">
                    <option value="">Выберите тип корпуса</option>
                    <option value="dome">Купольная</option>
                    <option value="ball">Камера типа шар</option>
                    <option value="bullet">Цилиндр</option>
                    <option value="PTZ">Поворотная</option>
                </select>
            </div>

            <div class="form-group" id="modelGroup" style="display: none;">
                <label for="model">Модель:</label><br>
                <select id="model">
                    <option value="">Выберите модель</option>
                </select>
            </div>

            <div class="form-group">
                <label for="mountType">Тип крепления:</label>
                <select id="mountType">
                    <option value="">Выберите тип крепления</option>
                    <option value="wallmount">Крепление на стену</option>
                    <option value="ceilmount">Крепеление на потолок</option>
                    <option value="conermount">Крепление на угол</option>
                    <option value="polemount">Крепление на столб</option>
                </select>
            </div>

            <!--button class="btn" onclick="findAccessories()">Подобрать аксессуары</button-->
        </div>

        <div class="results" id="results">
            <h2 class="result-title">Подходящие аксессуары</h2>
            <div class="accessory-grid" id="accessoryGrid">
                <!-- Результаты будут добавлены через JavaScript -->
            </div>
        </div>
    </div>
</br>
</body>
</html>
