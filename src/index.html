<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
	<script src = "script.js"></script>
</head>
<body>
    <div class="container" id="calc">
        <h1>Конфигуратор аксессуаров</h1>
        
        <div class="configurator">
            <div class="form-group">
                <label for="series" class="label-fild">Серия:</label>
                <select id="series" class="select-fild">
                    <option value="">Выберите серию</option>
                    <option value="1">1 серия</option>
                    <option value="3">3 серия</option>
                    <option value="G">G серия</option>
                </select>
            </div>

            <div class="form-group" id="case" style="display: none;">
                <label for="caseType" class="label-fild">Тип корпуса:</label>
                <select id="caseType" class="select-fild">
                    <option value="">Выберите тип корпуса</option>
                </select>
            </div>

            <div class="form-group" id="objective" style="display: none;">
                <label for="objectiveType" class="label-fild">Тип объектива:</label>
                <select id="objectiveType" class="select-fild">
                    <option value="">Выберите тип объектива</option>
                </select>
            </div>

            <div class="form-group" id="modelGroup" style="display: none;">
                <label for="model" class="label-fild">Модель:</label><br>
                <select id="model" class="select-fild">
                    <option value="">Выберите модель</option>
                </select>
            </div>

            <div class="form-group" id="mount" style="display: none;">
                <label for="mountType" class="label-fild">Тип крепления:</label>
                <select id="mountType" class="select-fild">
                    <option value="">Выберите тип крепления</option>
                </select>
            </div>

            <!--button class="btn" onclick="findAccessories()">Подобрать аксессуары</button-->
        </div>

        <div class="results" id="results">
            <h2 class="result-title">Подходящие аксессуары</h2>
            <div class="accessory-grid" id="accessoryGrid">
                <!-- Результаты будут добавлены через JavaScript -->
            </div>
        </div>
    </div>
</br>
</body>
</html>
